<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Grand Line Collectibles</title>
    <!-- OJO: Aquí usamos ../ para salir de la carpeta 'pages' y entrar a 'css' -->
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="header-container">
            <a href="../index.html" class="logo-box">
                <img src="../img/logo_calaveraOnePiece.jpg" alt="Logo One Piece" class="logo-img">
            <h1>Grand Line Collectibles</h1>
            <nav>
                <ul class="nav-list">
                    <!-- Volvemos al index saliendo de la carpeta -->
                    <li><a href="../index.html">Inicio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contacto-main">
        <h2 class="section-title">Envíame un Mensaje</h2>

        <!-- Formulario con Formspree -->
        <form action="https://formspree.io/f/xgvydpor" method="POST" class="contacto-form">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="name" required placeholder="Tu nombre pirata">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="message" rows="5" required
                    placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Duarte Team - Proyecto One Piece. Todos los derechos reservados.</p>
            <p>Desarrollado por Dario Duarte - Estudiante de Informática UNLP</p>
    
            <!-- Contenedor de Redes Sociales -->
            <div class="social-links">
                <a href="#" class="social-icon">
                    <img src="../img/whatsapp.png" alt="WhatsApp">
                </a>
                <a href="#" class="social-icon">
                    <img src="../img/instagram.png" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
